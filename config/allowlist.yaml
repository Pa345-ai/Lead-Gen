# Public endpoints that should NOT trigger MissingAuthentication (writes)
public_write_endpoints:
  - /token
  - /register
  - /reset-password
  - /reset-password/new-password
  - /login
  - /signup
  - /webhook          # often public by design
  - /healthcheck
  - /debug

# Public endpoints that should NOT trigger UnauthenticatedObjectRead / UnauthenticatedRead
public_read_endpoints:
  - /health
  - /healthcheck
  - /debug
  - /metrics
  - /docs
  - /openapi.json
  - /favicon.ico
  - /robots.txt
  - /version
